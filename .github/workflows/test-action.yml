name: Test Action

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: write

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create a dummy artifact
        run: echo "hello" > artifact.txt
      - uses: actions/upload-artifact@v7
        with:
          name: ca-test-${{ github.run_id }}
          path: artifact.txt

      - name: Dry-run (current branch)
        id: dry
        uses: ./
        with:
          branch: current
          name: 'ca-test-*'
          dry-run: true

      - name: Delete the test artifact
        id: clear
        uses: ./
        with:
          name: 'ca-test-*'
